name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint imports (sanity)
        run: python -c "import app.main"  # smoke-import API only — dashboard hits the API on load

      - name: Run tests
        env:
          GROQ_API_KEY: ""  # tests run without the LLM, fallback templates kick in
        run: pytest -q --maxfail=1 --disable-warnings

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f Dockerfile -t support-insights-api:ci .
      - name: Build dashboard image
        run: docker build -f Dockerfile.dashboard -t support-insights-dashboard:ci .

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render redeploy (API)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        if: env.HOOK != ''
        run: curl -fsS -X POST "$HOOK"
      - name: Trigger Render redeploy (dashboard)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_DASHBOARD }}
        if: env.HOOK != ''
        run: curl -fsS -X POST "$HOOK"
